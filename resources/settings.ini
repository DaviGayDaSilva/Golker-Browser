# Golker Browser - Configurações

[Browser]
Name = Golker Browser
Version = 1.0.0
Engine = Blink
ChromiumVersion = 120

[Memory]
MaxTabCache = 5
EnableTabSuspension = true
LazyLoadImages = true
PreloadMetadataOnly = true

[AI]
Enabled = true
Model = llama3-8b
ModelPath = ~/.local/share/golker/models/llama-3-8b-q4.bin
MaxContextLength = 8192
Quantization = q4_K_M

[Privacy]
BlockAds = true
BlockTrackers = true
DisableTelemetry = true
ClearOnExit = false

[Network]
MaxConnections = 6
KeepAlive = true
CacheSize = 250

[UI]
DarkMode = auto
TabPosition = top
Homepage = https://duckduckgo.com

[Downloads]
DefaultPath = ~/Downloads
PromptLocation = true
