plugins {
    id 'com.android.application'
}

android {
    namespace 'com.golker.browser'
    compileSdk 21

    defaultConfig {
        applicationId "com.golker.browser"
        minSdk 21
        targetSdk 21
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
